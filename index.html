<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build whatever - Project Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="terminal-window">
                <div class="terminal-content">
                    <div class="logo-section">
                        <div class="logo-icon"></div>
                        <div class="logo-text">Build whatever</div>
                    </div>
                    <div class="description">
                        Onchain project generator
                    </div>
                    <div class="instructions">
                        <div class="instruction-item">1. Pick difficulty</div>
                        <div class="instruction-item">2. Load challenge</div>
                        <div class="instruction-item">3. Build!</div>
                    </div>
                </div>
            </div>
            <div class="difficulty-buttons">
                <button class="difficulty-btn easy active">EASY</button>
                <button class="difficulty-btn medium">MEDIUM</button>
                <button class="difficulty-btn hard">HARD</button>
            </div>
            <div class="load-button">
                <button class="load-btn">LOAD CHALLENGE ↓</button>
            </div>
        </div>
        <div class="right-panel">
            <div class="challenge-window">
                <div class="corner corner-top-left"></div>
                <div class="corner corner-top-right"></div>
                <div class="corner corner-bottom-left"></div>
                <div class="corner corner-bottom-right"></div>
                
                <div class="side-decoration side-decoration-left"></div>
                <div class="side-decoration side-decoration-right"></div>
                
                <div class="star star-top-left">✧</div>
                <div class="star star-top-right">✧</div>
                <div class="star star-bottom-left">✧</div>
                <div class="star star-bottom-right">✧</div>
                
                <div class="challenge-content">
                    <div class="avatar-section">
                        <div class="avatar"></div>
                    </div>
                    <div class="challenge-details">
                        <div class="challenge-line">
                            <span class="label">BUILD:</span>
                            <span class="value">A SINGLE DETAIL VIEW</span>
                        </div>
                        <div class="challenge-line">
                            <span class="label">ON:</span>
                            <span class="value on-value">A FINANCIAL GOAL TRACKING APP</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
